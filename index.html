<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キラキラ・マウスストーカー（くま）</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0514; /* 紫が最も美しく映える深みのある背景 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .instruction {
            color: rgba(210, 180, 255, 0.4); /* 文字も淡い紫に */
            font-size: 1.5rem;
            letter-spacing: 2px;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="instruction">マウスを動かしてみてね (🐻)</div>
    <canvas id="particleCanvas"></canvas>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                // 初期サイズ（絵文字なので少し大きめに調整）
                this.size = Math.random() * 15 + 10;
                // 飛び散る方向と速度
                this.speedX = (Math.random() - 0.5) * 5;
                this.speedY = (Math.random() - 0.5) * 5;
                
                // 光彩（グロー効果）の色（青紫〜赤紫）
                const hue = Math.random() * 60 + 260;
                this.color = `hsl(${hue}, 100%, 70%)`;
                
                this.alpha = 1;
                this.decay = Math.random() * 0.01 + 0.005; // 少しゆっくり消えるように
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
                if (this.size > 1) this.size -= 0.1; // 徐々に小さく
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                // 円の代わりにくまの絵文字を描画
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // 後ろにほんのり紫の光をまとう
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                ctx.fillText("🐻", this.x, this.y);

                ctx.restore();
            }
        }

        window.addEventListener('mousemove', (e) => {
            // 1回の移動で3個のくまを生成
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                for (let i = 0; i < 2; i++) {
                    particles.push(new Particle(e.touches[0].clientX, e.touches[0].clientY));
                }
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>

</body>
</html>
